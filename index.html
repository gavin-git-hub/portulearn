<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PortuLearn 🇧🇷</title>
<link rel="icon" type="image/png" href="icon.png"/>
<link rel="apple-touch-icon" href="icon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --c-bg:#05080f;
  --c-surface:#0d1117;
  --c-card:#111827;
  --c-card2:#161f2e;
  --c-hover:#1a2540;
  --c-border:rgba(255,255,255,0.06);
  --c-border2:rgba(255,255,255,0.12);
  --c-teal:#2dd4a8;
  --c-teal-dim:rgba(45,212,168,0.15);
  --c-teal-glow:rgba(45,212,168,0.3);
  --c-blue:#4f8ef7;
  --c-amber:#f59e0b;
  --c-purple:#a78bfa;
  --c-purple-dim:rgba(167,139,250,0.15);
  --c-red:#f87171;
  --c-text:#e2e8f0;
  --c-text2:#94a3b8;
  --c-text3:#475569;
  --r-sm:8px;
  --r-md:14px;
  --r-lg:20px;
  --r-xl:28px;
  --ease:cubic-bezier(.4,0,.2,1);
}
html{font-size:15px;scroll-behavior:smooth}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--c-bg);
  color:var(--c-text);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
body::before{
  content:'';
  position:fixed;
  top:-30%;left:-20%;
  width:60%;height:70%;
  background:radial-gradient(ellipse,rgba(45,212,168,0.07) 0%,transparent 70%);
  pointer-events:none;
  z-index:0;
}
body::after{
  content:'';
  position:fixed;
  bottom:-20%;right:-10%;
  width:50%;height:60%;
  background:radial-gradient(ellipse,rgba(79,142,247,0.06) 0%,transparent 70%);
  pointer-events:none;
  z-index:0;
}

/* ── HIDDEN ── */
.hidden{display:none !important}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--c-border2);border-radius:4px}

/* ─────────────────────────────────
   HEADER
───────────────────────────────── */
.hdr{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;height:56px;
  background:rgba(5,8,15,0.8);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--c-border);
}
.logo{display:flex;align-items:center;gap:10px}
.logo-flag{font-size:22px}
.logo-name{
  font-size:18px;font-weight:800;letter-spacing:-0.5px;
  background:linear-gradient(135deg,var(--c-teal),var(--c-blue));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.logo-badge{
  font-size:10px;color:var(--c-text3);
  background:var(--c-card);border:1px solid var(--c-border);
  padding:2px 8px;border-radius:20px;letter-spacing:0.02em;
}
.hdr-right{display:flex;gap:8px}

/* ─────────────────────────────────
   BUTTONS
───────────────────────────────── */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 18px;border-radius:var(--r-sm);
  font-size:13px;font-weight:600;cursor:pointer;
  border:none;font-family:inherit;
  transition:all 180ms var(--ease);
  white-space:nowrap;
}
.btn-primary{
  background:linear-gradient(135deg,var(--c-teal) 0%,#16a882 100%);
  color:#041810;box-shadow:0 4px 20px rgba(45,212,168,0.25);
}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(45,212,168,0.4)}
.btn-primary:active{transform:translateY(0)}
.btn-ghost{
  background:rgba(255,255,255,0.05);color:var(--c-text2);
  border:1px solid var(--c-border);
}
.btn-ghost:hover{background:rgba(255,255,255,0.09);color:var(--c-text);border-color:var(--c-border2)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-ai{
  background:linear-gradient(135deg,var(--c-purple-dim),rgba(79,142,247,0.15));
  color:var(--c-purple);border:1px solid rgba(167,139,250,0.25);
}
.btn-ai:hover{background:linear-gradient(135deg,rgba(167,139,250,0.25),rgba(79,142,247,0.25));box-shadow:0 0 20px rgba(167,139,250,0.2)}
.btn-danger{
  background:rgba(248,113,113,0.1);color:var(--c-red);
  border:1px solid rgba(248,113,113,0.25);
}
.btn-danger:hover{background:rgba(248,113,113,0.2)}

/* ─────────────────────────────────
   HOME / URL PANEL
───────────────────────────────── */
#page-home{
  position:relative;z-index:1;
  display:flex;align-items:center;justify-content:center;
  min-height:calc(100vh - 56px);
  padding:40px 20px;
}
.home-box{
  width:100%;max-width:600px;
  display:flex;flex-direction:column;gap:28px;
}
.home-hero{text-align:center}
.home-hero h1{
  font-size:clamp(28px,5vw,46px);font-weight:800;letter-spacing:-1px;
  line-height:1.15;
  background:linear-gradient(160deg,#fff 30%,var(--c-teal));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.home-hero p{margin-top:12px;color:var(--c-text2);font-size:15px}

.url-card{
  background:var(--c-card);
  border:1px solid var(--c-border);
  border-radius:var(--r-xl);
  padding:28px;
  display:flex;flex-direction:column;gap:16px;
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
}
.url-field{
  display:flex;align-items:center;gap:10px;
  background:var(--c-surface);
  border:1.5px solid var(--c-border);
  border-radius:var(--r-md);
  padding:0 16px;
  transition:border-color 180ms var(--ease),box-shadow 180ms var(--ease);
}
.url-field:focus-within{
  border-color:var(--c-teal);
  box-shadow:0 0 0 3px var(--c-teal-dim);
}
.url-field span{font-size:18px;flex-shrink:0;opacity:0.5}
#inp-url{
  flex:1;background:none;border:none;outline:none;
  color:var(--c-text);font-size:14px;font-family:inherit;
  padding:14px 0;
}
#inp-url::placeholder{color:var(--c-text3)}
.url-row{display:flex;gap:10px}
.url-row .url-field{flex:1}
.url-hints{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.hint-lbl{font-size:12px;color:var(--c-text3)}
.hint-chip{
  font-size:12px;color:var(--c-teal);
  background:var(--c-teal-dim);border:1px solid rgba(45,212,168,0.2);
  border-radius:20px;padding:3px 12px;
  cursor:pointer;font-family:inherit;
  transition:all 180ms var(--ease);
}
.hint-chip:hover{background:rgba(45,212,168,0.25);border-color:rgba(45,212,168,0.5)}

.api-section{
  background:var(--c-surface);
  border:1px solid var(--c-border);
  border-radius:var(--r-md);
  padding:18px 20px;
  display:flex;flex-direction:column;gap:10px;
}
.api-lbl{
  display:flex;align-items:center;gap:8px;
  font-size:13px;font-weight:600;color:var(--c-text2);
}
.api-sub{font-weight:400;font-size:11px;color:var(--c-text3)}
.api-row{display:flex;gap:8px}
.inp-api{
  flex:1;background:var(--c-card);border:1px solid var(--c-border);
  border-radius:var(--r-sm);padding:8px 12px;
  color:var(--c-text);font-family:monospace;font-size:13px;outline:none;
  transition:border-color 180ms;
}
.inp-api:focus{border-color:var(--c-teal)}
.api-note{font-size:11px;color:var(--c-text3)}

/* ─────────────────────────────────
   PLAYER PAGE
───────────────────────────────── */
#page-player{
  position:relative;z-index:1;
  display:grid;
  grid-template-columns:1fr 360px;
  gap:12px;
  height:calc(100vh - 56px);
  height:calc(100dvh - 56px);
  padding:12px;
  max-width:1700px;
  margin:0 auto;
}
@media(max-width:1100px){
  #page-player{
    grid-template-columns:1fr;
    grid-template-rows:auto minmax(0,1fr);
  }
  .col-left{height:auto;flex:none}
  .story-card{flex:none;padding:10px}
}
@media(max-width:600px){
  #page-player{padding:8px;gap:8px}
  .ctrl-row{flex-wrap:wrap;justify-content:center}
  .ctrl-card{padding:10px}
}

/* ── LEFT COLUMN ── */
.col-left{
  display:flex;flex-direction:column;gap:10px;min-width:0;overflow:hidden;
}

/* Video */
.vid-wrap{
  position:relative;
  width:100%;aspect-ratio:16/9;
  background:#000;
  border-radius:var(--r-lg);
  overflow:hidden;
  box-shadow:0 8px 40px rgba(0,0,0,0.6);
  flex-shrink:0;
}
#yt-player{width:100% !important;height:100% !important}
.vid-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0}

/* Controls */
.ctrl-card{
  background:var(--c-card);
  border:1px solid var(--c-border);
  border-radius:var(--r-md);
  padding:14px 16px;
  display:flex;flex-direction:column;gap:10px;
  flex-shrink:0;
}
.prog-row{display:flex;align-items:center;gap:10px}
.t-lbl{font-size:12px;color:var(--c-text3);font-variant-numeric:tabular-nums;min-width:34px}
.prog-track{
  flex:1;position:relative;
  padding:10px 0;cursor:pointer;
}
.prog-bg{
  height:4px;background:rgba(255,255,255,0.08);
  border-radius:4px;position:relative;overflow:visible;
}
.prog-fill{
  position:absolute;inset:0;right:auto;
  background:linear-gradient(90deg,var(--c-teal),#4af7cc);
  border-radius:4px;width:0%;
  transition:width 100ms linear;
}
.prog-thumb{
  position:absolute;top:50%;left:0%;
  transform:translate(-50%,-50%);
  width:14px;height:14px;
  background:var(--c-teal);border-radius:50%;
  box-shadow:0 0 10px var(--c-teal-glow);
  transition:left 100ms linear;
  pointer-events:none;
}
.seg-marks{position:absolute;inset:0;pointer-events:none}
.seg-mark{
  position:absolute;top:-3px;bottom:-3px;width:2px;
  background:rgba(245,158,11,0.5);border-radius:2px;
}
.ctrl-row{
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;
}
.ctrl-grp{display:flex;align-items:center;gap:4px}
.ic-btn{
  background:none;border:1px solid transparent;
  color:var(--c-text2);cursor:pointer;
  font-size:17px;padding:6px 9px;border-radius:var(--r-sm);
  transition:all 160ms var(--ease);display:flex;align-items:center;
  font-family:inherit;
}
.ic-btn:hover{background:var(--c-hover);color:var(--c-text);border-color:var(--c-border)}
.ic-btn.large{
  font-size:20px;padding:8px 14px;
  background:var(--c-teal-dim);border-color:rgba(45,212,168,0.3);
  color:var(--c-teal);
}
.ic-btn.large:hover{background:rgba(45,212,168,0.25)}
.ic-btn.on{color:var(--c-teal);background:var(--c-teal-dim);border-color:rgba(45,212,168,0.3)}
.spd-btn{
  font-size:12px;font-weight:700;padding:6px 12px;
  color:var(--c-amber);border-color:rgba(245,158,11,0.2);
}
.spd-btn:hover{background:rgba(245,158,11,0.1);border-color:rgba(245,158,11,0.4)}
.loop-chip{
  display:flex;align-items:center;gap:6px;
  font-size:12px;font-weight:500;
  padding:5px 12px;border-radius:20px;
  color:var(--c-text3);
  border:1px solid transparent;
  transition:all 180ms var(--ease);
}
.loop-chip.on{
  color:var(--c-teal);background:var(--c-teal-dim);
  border-color:rgba(45,212,168,0.25);
}
.loop-dot{
  width:7px;height:7px;border-radius:50%;
  background:currentColor;
}
.loop-chip.on .loop-dot{animation:blink 1.4s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

/* Story Bar */
.story-card{
  background:var(--c-card);
  border:1px solid var(--c-border);
  border-radius:var(--r-md);
  padding:12px 16px;
  display:flex;flex-direction:column;gap:10px;
  flex:1;min-height:0;overflow:hidden;
}
.story-hdr{
  display:flex;align-items:center;justify-content:space-between;
}
.story-ttl{font-size:12px;font-weight:700;color:var(--c-text3);text-transform:uppercase;letter-spacing:0.06em}
.story-cnt{font-size:11px;color:var(--c-text3);background:var(--c-surface);padding:2px 8px;border-radius:20px}
.story-list{
  display:flex;gap:8px;
  overflow-x:auto;padding-bottom:4px;
}
.seg-btn{
  flex-shrink:0;
  background:var(--c-surface);border:1px solid var(--c-border);
  border-radius:var(--r-sm);
  padding:8px 14px;cursor:pointer;
  font-family:inherit;
  transition:all 160ms var(--ease);
  text-align:left;
}
.seg-btn:hover{background:var(--c-hover);border-color:var(--c-border2)}
.seg-btn.active{
  background:var(--c-teal-dim);border-color:rgba(45,212,168,0.4);
}
.seg-name{font-size:13px;font-weight:600;color:var(--c-text);display:block}
.seg-btn.active .seg-name{color:var(--c-teal)}
.seg-time{font-size:11px;color:var(--c-text3);display:block;margin-top:2px}

/* ── RIGHT COLUMN ── */
.col-right{
  display:flex;flex-direction:column;
  background:var(--c-card);
  border:1px solid var(--c-border);
  border-radius:var(--r-lg);
  overflow:hidden;
}

/* Tabs */
.tab-bar{
  display:flex;
  border-bottom:1px solid var(--c-border);
  background:var(--c-surface);
  flex-shrink:0;
}
.tab-btn{
  flex:1;background:none;border:none;
  padding:13px 6px;
  font-size:12px;font-weight:600;font-family:inherit;
  color:var(--c-text3);cursor:pointer;
  border-bottom:2px solid transparent;
  margin-bottom:-1px;
  transition:all 160ms var(--ease);
}
.tab-btn:hover{color:var(--c-text2);background:rgba(255,255,255,0.03)}
.tab-btn.active{color:var(--c-teal);border-bottom-color:var(--c-teal)}
.tab-panel{display:none;flex-direction:column;flex:1;overflow:hidden;min-height:0}
.tab-panel.active{display:flex}

/* Subtitle panel */
.sub-toolbar{
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  padding:10px 14px;border-bottom:1px solid var(--c-border);
  flex-shrink:0;
}
.chk-lbl{
  display:flex;align-items:center;gap:5px;
  font-size:12px;color:var(--c-text2);cursor:pointer;
}
.chk-lbl input{accent-color:var(--c-teal)}
.sub-list{
  flex:1;overflow-y:auto;
  padding:8px;
  display:flex;flex-direction:column;gap:2px;
}
.sub-item{
  padding:9px 12px;border-radius:var(--r-sm);
  cursor:pointer;border:1px solid transparent;
  transition:all 150ms var(--ease);
}
.sub-item:hover{background:var(--c-hover)}
.sub-item.active{
  background:rgba(45,212,168,0.07);
  border-color:rgba(45,212,168,0.2);
}
.sub-pt{font-size:14px;color:var(--c-teal);font-weight:500;line-height:1.5}
.sub-zh{font-size:12px;color:var(--c-text2);margin-top:3px;line-height:1.4}
.sub-ts{font-size:10px;color:var(--c-text3);margin-top:2px;font-variant-numeric:tabular-nums}
.sub-empty{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:10px;color:var(--c-text3);
  padding:40px;text-align:center;
}
.sub-empty-ico{font-size:36px;opacity:.4}
.sub-empty p{font-size:13px}
.sub-empty small{font-size:11px;opacity:.6}

/* Vocab panel */
.vocab-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-bottom:1px solid var(--c-border);flex-shrink:0;
}
.vocab-ttl{font-size:13px;font-weight:700;color:var(--c-text2)}
.vocab-list{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:8px}
.v-item{
  background:var(--c-card2);border:1px solid var(--c-border);
  border-radius:var(--r-md);padding:14px 16px;
  display:flex;flex-direction:column;gap:5px;
  transition:border-color 160ms;
}
.v-item:hover{border-color:var(--c-border2)}
.v-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.v-word{font-size:17px;font-weight:700;color:var(--c-teal)}
.v-pos{
  font-size:10px;color:var(--c-purple);
  background:var(--c-purple-dim);padding:2px 7px;
  border-radius:4px;font-weight:600;
}
.v-mean{font-size:14px;font-weight:600;color:var(--c-text)}
.v-eg{font-size:12px;color:var(--c-text2);font-style:italic}
.v-eg-zh{font-size:11px;color:var(--c-text3)}
.vocab-ph{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:10px;color:var(--c-text3);
  padding:40px;text-align:center;
}
.vocab-ph-ico{font-size:36px;opacity:.4}

/* Cards panel */
.cards-area{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:20px;perspective:1000px;
}
.fc{
  width:100%;max-width:290px;
  aspect-ratio:3/2;
  position:relative;
  cursor:pointer;
  transform-style:preserve-3d;
  transition:transform .55s var(--ease);
}
.fc.flip{transform:rotateY(180deg)}
.fc-face{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:10px;
  border-radius:var(--r-xl);
  padding:24px;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  text-align:center;
}
.fc-front{
  background:linear-gradient(145deg,var(--c-card2),var(--c-card));
  border:1px solid var(--c-border);
}
.fc-back{
  transform:rotateY(180deg);
  background:linear-gradient(145deg,rgba(45,212,168,0.08),rgba(79,142,247,0.08));
  border:1px solid rgba(45,212,168,0.25);
}
.fc-word{font-size:30px;font-weight:800;color:var(--c-teal)}
.fc-hint{font-size:11px;color:var(--c-text3)}
.fc-mean{font-size:20px;font-weight:700;color:var(--c-text)}
.fc-eg{font-size:12px;color:var(--c-text2);font-style:italic}
.fc-eg-zh{font-size:11px;color:var(--c-text3);font-style:normal}
.cards-nav{
  display:flex;align-items:center;justify-content:center;
  gap:16px;padding:14px;
  border-top:1px solid var(--c-border);
  flex-shrink:0;
}
.cards-prog{font-size:13px;color:var(--c-text3);min-width:56px;text-align:center}

/* ─────────────────────────────────
   AI LOADING
───────────────────────────────── */
.ai-overlay{
  position:fixed;inset:0;z-index:400;
  background:rgba(0,0,0,.75);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:center;
}
.ai-box{
  background:var(--c-card);
  border:1px solid var(--c-border);
  border-radius:var(--r-xl);
  padding:40px 50px;
  text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:16px;
  box-shadow:0 30px 80px rgba(0,0,0,.5);
}
.ai-spin{
  width:52px;height:52px;
  border:3px solid rgba(45,212,168,.15);
  border-top-color:var(--c-teal);
  border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.ai-ttl{font-size:16px;font-weight:700}
.ai-sub{font-size:13px;color:var(--c-text3)}

/* ─────────────────────────────────
   MODAL
───────────────────────────────── */
.modal-bg{
  position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,.72);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  padding:20px;
}
.modal{
  background:var(--c-card);
  border:1px solid var(--c-border);
  border-radius:var(--r-xl);
  width:100%;max-width:740px;
  max-height:82vh;
  display:flex;flex-direction:column;
  box-shadow:0 30px 80px rgba(0,0,0,.5);
}
.modal-sm{max-width:420px}
.modal-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 24px;border-bottom:1px solid var(--c-border);
}
.modal-ttl{font-size:17px;font-weight:700}
.modal-x{
  background:none;border:none;color:var(--c-text3);cursor:pointer;
  font-size:18px;padding:4px 8px;border-radius:8px;
  transition:all 160ms;
}
.modal-x:hover{background:var(--c-hover);color:var(--c-text)}
.modal-body{
  flex:1;overflow-y:auto;
  padding:20px 24px;
  display:flex;flex-direction:column;gap:16px;
}
.modal-ftr{
  display:flex;align-items:center;gap:10px;
  padding:14px 24px;border-top:1px solid var(--c-border);
}
.modal-empty{color:var(--c-text3);text-align:center;padding:40px 0;font-size:14px}

/* Material card */
.mat-card{
  background:var(--c-card2);border:1px solid var(--c-border);
  border-radius:var(--r-md);overflow:hidden;
}
.mat-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;background:rgba(255,255,255,0.03);
  border-bottom:1px solid var(--c-border);
  font-size:13px;font-weight:600;color:var(--c-text2);
}
.mat-body{padding:16px;display:flex;flex-direction:column;gap:16px}
.mat-sec-ttl{
  font-size:11px;color:var(--c-text3);
  text-transform:uppercase;letter-spacing:.07em;font-weight:700;
  margin-bottom:6px;
}
.bi-row{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  padding:8px 0;border-bottom:1px solid var(--c-border);
}
.bi-pt{font-size:13px;color:var(--c-teal);line-height:1.5}
.bi-zh{font-size:13px;color:var(--c-text2);line-height:1.5}
.tag-cloud{display:flex;flex-wrap:wrap;gap:8px}
.v-tag{
  background:var(--c-surface);border:1px solid var(--c-border);
  border-radius:10px;padding:8px 12px;
}
.v-tag-word{font-size:13px;font-weight:700;color:var(--c-teal)}
.v-tag-mean{font-size:12px;color:var(--c-text2)}

/* Settings */
.set-grp{display:flex;flex-direction:column;gap:5px}
.set-lbl{font-size:13px;font-weight:600;color:var(--c-text2)}
.set-inp,.set-sel{
  background:var(--c-surface);border:1px solid var(--c-border);
  border-radius:var(--r-sm);padding:9px 12px;
  color:var(--c-text);font-family:inherit;font-size:14px;outline:none;
  transition:border-color 160ms;
}
.set-inp:focus,.set-sel:focus{border-color:var(--c-teal)}
.set-sel option{background:var(--c-card)}

/* ─────────────────────────────────
   TOASTS
───────────────────────────────── */
.toasts{
  position:fixed;bottom:20px;right:20px;z-index:500;
  display:flex;flex-direction:column;gap:8px;pointer-events:none;
}
.toast{
  background:var(--c-card);border:1px solid var(--c-border);
  border-radius:var(--r-md);padding:11px 18px;
  font-size:13px;font-weight:500;
  box-shadow:0 8px 30px rgba(0,0,0,.4);
  animation:tst .3s var(--ease);
  max-width:300px;pointer-events:auto;
}
@keyframes tst{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:none}}
.toast.ok{border-color:rgba(45,212,168,.4);color:var(--c-teal)}
.toast.er{border-color:rgba(248,113,113,.4);color:var(--c-red)}
.toast.in{border-color:rgba(79,142,247,.4);color:var(--c-blue)}
</style>
</head>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
// ====================================================================
// STATE
// ====================================================================
const S = {
  player:null, videoId:null, dur:0, now:0,
  playing:false, looping:true, rate:1,
  segMode:'auto', segLen:270, customStart:0, customEnd:270,
  segs:[], segIdx:0,
  subs:[], subIdx:-1,
  autoScroll:true, showPt:true, showZh:true,
  apiKey:'', lang:'zh', geminiModel:'gemini-2.0-flash-lite',
  materials:[], cards:[], cardIdx:0,
  raf:null, dragging:false,
};

// ====================================================================
// UTILS
// ====================================================================
const $=id=>document.getElementById(id);
const fmt=s=>(!isFinite(s)||s<0)?'0:00':`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;

function toast(msg,type='in',dur=3000){
  const el=document.createElement('div');
  el.className=`toast ${type}`;el.textContent=msg;
  $('toasts').appendChild(el);
  setTimeout(()=>el.remove(),dur);
}

function setAI(show, sub='', title='AI 分析中...'){
  $('ai-overlay').classList.toggle('hidden',!show);
  if(title)$('ai-ttl').textContent=title;
  if(sub)$('ai-sub').textContent=sub;
}

function save(){
  localStorage.setItem('pl_key',S.apiKey);
  localStorage.setItem('pl_mats',JSON.stringify(S.materials));
  localStorage.setItem('pl_set',JSON.stringify({
    segMode:S.segMode, segLen:S.segLen, customStart:S.customStart, customEnd:S.customEnd,
    lang:S.lang, rate:S.rate, model:S.geminiModel
  }));
}

function load(){
  S.apiKey=localStorage.getItem('pl_key')||'';
  if(S.apiKey)$('inp-key').value=S.apiKey;
  try{const m=JSON.parse(localStorage.getItem('pl_mats')||'[]');S.materials=m;}catch{}
  try{
    const s=JSON.parse(localStorage.getItem('pl_set')||'{}');
    if(s.segLen){
      // Migrate old minutes values (≤15) to seconds
      S.segLen=(s.segLen<=15)?s.segLen*60:s.segLen;
    }
    if(s.segMode)S.segMode=s.segMode;
    if(s.customStart!==undefined)S.customStart=s.customStart;
    if(s.customEnd!==undefined)S.customEnd=s.customEnd;
    if(s.lang)S.lang=s.lang;
    if(s.rate)S.rate=s.rate;
    if(s.model)S.geminiModel=s.model;
    $('set-seglen').value=S.segLen;
    $('set-segmode').value=S.segMode;
    $('set-cs-m').value=Math.floor(S.customStart/60);
    $('set-cs-s').value=Math.floor(S.customStart%60);
    $('set-ce-m').value=Math.floor(S.customEnd/60);
    $('set-ce-s').value=Math.floor(S.customEnd%60);
    $('set-lang').value=S.lang;
    $('set-spd').value=S.rate;
    $('set-model').value=S.geminiModel;
    
    // Trigger UI toggle
    $('grp-seg-auto').classList.toggle('hidden', S.segMode==='custom');
    $('grp-seg-custom').classList.toggle('hidden', S.segMode!=='custom');
  }catch{}
}

function extractId(url){
  try{
    const u=new URL(url);
    if(u.hostname.includes('youtube.com'))return u.searchParams.get('v');
    if(u.hostname==='youtu.be')return u.pathname.slice(1);
  }catch{}
  const m=url.match(/(?:v=|youtu\.be\/)([A-Za-z0-9_-]{11})/);
  return m?m[1]:null;
}

function switchTab(name){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===name));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.toggle('active',p.id===`tab-${name}`));
}

// ====================================================================
// YOUTUBE API
// ====================================================================
let ytReady=false,pendingVid=null;

window.onYouTubeIframeAPIReady=function(){
  ytReady=true;
  if(pendingVid)initPlayer(pendingVid);
};

function initPlayer(videoId){
  if(!ytReady){pendingVid=videoId;return;}
  localStorage.setItem('pl_last_vid', videoId);
  if(S.player){S.player.loadVideoById(videoId);return;}
  S.player=new YT.Player('yt-player',{
    videoId,
    playerVars:{controls:0,rel:0,modestbranding:1,playsinline:1,iv_load_policy:3},
    events:{onReady:onReady,onStateChange:onChange},
  });
}

function onReady(){
  S.dur=S.player.getDuration();
  $('t-tot').textContent=fmt(S.dur);
  S.player.setPlaybackRate(S.rate);
  buildSegs();
  startLoop();
}

function onChange(e){
  if(e.data===1){S.playing=true;$('btn-pp').textContent='⏸';}
  else if(e.data===0||e.data===2){
    S.playing=false;$('btn-pp').textContent='▶';
    if(e.data===0&&S.looping){
      const sg=S.segs[S.segIdx];if(sg)S.player.seekTo(sg.s,true);
    }
  }
  if(e.data===1&&!S.dur){
    S.dur=S.player.getDuration();
    $('t-tot').textContent=fmt(S.dur);
    buildSegs();
  }
}

// ====================================================================
// RAF LOOP
// ====================================================================
function startLoop(){
  if(S.raf)cancelAnimationFrame(S.raf);
  (function loop(){
    if(S.player&&S.player.getCurrentTime){
      const t=S.player.getCurrentTime()||0;
      S.now=t;
      updateProg(t);
      updateSubHL(t);
      checkLoop(t);
    }
    S.raf=requestAnimationFrame(loop);
  })();
}

function updateProg(t){
  const pct=S.dur>0?(t/S.dur)*100:0;
  $('prog-fill').style.width=pct+'%';
  $('prog-thumb').style.left=pct+'%';
  $('t-cur').textContent=fmt(t);
}

function checkLoop(t){
  if(!S.looping||!S.segs.length)return;
  const sg=S.segs[S.segIdx];
  if(sg&&t>=sg.e-0.4){S.player.seekTo(sg.s,true);if(!S.playing)S.player.playVideo();}
}

// ====================================================================
// SEGMENTS
// ====================================================================
function buildSegs(){
  const total=S.dur;
  if(!total)return;
  S.segs=[];
  
  if(S.segMode==='custom'){
    const s = Math.max(0, S.customStart);
    const e = Math.min(total, S.customEnd > s ? S.customEnd : total);
    S.segs.push({s, e, label: '自定义'});
  } else {
    const slen=S.segLen;
    for(let t=0,i=0;t<total;t+=slen,i++)
      S.segs.push({s:t,e:Math.min(t+slen,total),label:`故事 ${i+1}`});
  }
  
  renderSegList();
  jumpTo(0);
}

function renderSegList(){
  const list=$('seg-list');list.innerHTML='';
  $('seg-cnt').textContent=`共 ${S.segs.length} 段`;

// SUBTITLES
// ====================================================================
async function fetchSubs(vid){
  const isChinese=t=>/[\u4e00-\u9fa5]/.test(t||'');

  async function getSignedCaptionUrl(){
    const pageUrl=`https://www.youtube.com/watch?v=${vid}`;
    const proxyUrls=[
      `https://api.allorigins.win/raw?url=${encodeURIComponent(pageUrl)}`,
      `https://corsproxy.io/?${pageUrl}`,
    ];
    for(const url of proxyUrls){
      try{
        const r=await fetch(url,{signal:AbortSignal.timeout(12000)});
        if(!r.ok)continue;
        const html=await r.text();
        const idx=html.indexOf('"captionTracks":');
        if(idx===-1)continue;
        let depth=0,start=-1,end=-1;
        for(let i=idx+16;i<html.length;i++){
          if(html[i]==='['&&start===-1){start=i;depth=1;}
          else if(start!==-1){
            if(html[i]==='['||html[i]==='{')depth++;
            else if(html[i]===']'||html[i]==='}'){if(--depth===0){end=i+1;break;}}
          }
        }
        if(start===-1)continue;
        const raw=html.slice(start,end).replace(/\\u0026/g,'&').replace(/\\"/g,'"');
        const tracks=JSON.parse(raw);
        const ptTrack=tracks.find(t=>t.languageCode==='pt-BR')
          ||tracks.find(t=>t.languageCode==='pt')
          ||tracks.find(t=>t.languageCode?.startsWith('pt'));
        if(ptTrack?.baseUrl)return{baseUrl:ptTrack.baseUrl,translatable:ptTrack.isTranslatable};
      }catch(e){console.warn('caption page fetch error:',e);}
    }
    return null;
  }

  async function fetchSubJson(url){
    try{
      const r=await fetch(url,{signal:AbortSignal.timeout(8000)});
      if(r.ok)return await r.json();
    }catch{}
    return null;
  }

  // ── 0. Check local cache first ──
  const cached = localStorage.getItem('pl_subs_' + vid);
  if (cached) {
    try {
      const cachedSubs = JSON.parse(cached);
      if (cachedSubs && cachedSubs.length) {
        S.subs = cachedSubs;
        S.isDemo = false;
        toast('✅ 已从本地缓存加载字幕', 'ok');
        const sg=S.segs[S.segIdx];if(sg)renderSubsForSeg(sg);
        return;
      }
    } catch(e) {}
  }

  setAI(true,'⏳ 正在获取字幕...', '系统加载中...');
  const captionInfo=await getSignedCaptionUrl();
  let subs=null;

  if(captionInfo?.baseUrl){
    const ptJson=await fetchSubJson(captionInfo.baseUrl+'&fmt=json3');
    subs=parseYT(ptJson);

    if(subs?.length&&captionInfo.translatable){
      for(const zlang of['zh-Hans','zh-CN','zh']){
        const zhJson=await fetchSubJson(captionInfo.baseUrl+`&fmt=json3&tlang=${zlang}`);
        const zhSubs=parseYT(zhJson);
        if(zhSubs?.length&&isChinese(zhSubs[0]?.pt)){
          subs.forEach((sub,i)=>{if(zhSubs[i]&&isChinese(zhSubs[i].pt))sub.zh=zhSubs[i].pt;});
          break;
        }
      }
    }
  }

  setAI(false);
  S.isDemo=!subs?.length;
  if(S.isDemo){
    subs=demoSubs();
    toast('⚠️ 演示字幕 — 无法获取真实字幕，点「🌐 翻译字幕」可用AI翻译','in',6000);
  }else{
    const hasZh=subs.some(s=>s.zh);
    toast(hasZh?'✅ 双语字幕已加载（葡语 + 中文）':'✅ 葡语字幕已加载 — 点「🌐 翻译字幕」添加中文','ok',4000);
    localStorage.setItem('pl_subs_' + vid, JSON.stringify(subs));
  }
  S.subs=subs;
  const sg=S.segs[S.segIdx];if(sg)renderSubsForSeg(sg);
}

// IMPORT SUBTITLES (SRT/VTT)
// ====================================================================
function parseLocalSub(text) {
  const res = [];
  const blocks = text.trim().split(/\n\s*\n/);
  for (const b of blocks) {
    if(b.includes('WEBVTT')) continue;
    const lines = b.split('\n');
    let timeLineIdx = lines.findIndex(l => l.includes('-->'));
    if (timeLineIdx === -1) continue;
    const timeLine = lines[timeLineIdx];
    const ptLine = lines.slice(timeLineIdx+1).join('\n').trim();
    
    const parseTime = (tStr) => {
      const parts = tStr.trim().replace(',', '.').split(':');
      let sec = 0;
      if (parts.length === 3) sec = parseInt(parts[0])*3600 + parseInt(parts[1])*60 + parseFloat(parts[2]);
      else if (parts.length === 2) sec = parseInt(parts[0])*60 + parseFloat(parts[1]);
      return sec;
    };
    
    const [startStr, endStr] = timeLine.split('-->');
    const s = parseTime(startStr);
    const e = parseTime(endStr);
    if (!isNaN(s) && !isNaN(e) && ptLine) res.push({s, e, pt:ptLine});
  }
  return res;
}

$('inp-sub').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const text = await file.text();
  const newSubs = parseLocalSub(text);
  e.target.value = '';
  
  if(!newSubs.length) return toast('无法解析该字幕文件，请确认是 SRT/VTT 格式','er');
  
  const isChinese=t=>/[\u4e00-\u9fa5]/.test(t||'');
  newSubs.forEach(s => {
    const lines = s.pt.split('\n');
    if(lines.length > 1) {
      const zhLines = lines.filter(l => isChinese(l));
      const ptLines = lines.filter(l => !isChinese(l));
      if(zhLines.length > 0) {
        s.zh = zhLines.join(' ');
        s.pt = ptLines.length ? ptLines.join(' ') : '---';
        return;
      }
    }
    if(isChinese(s.pt)) { s.zh = s.pt; s.pt = '---'; }
  });
  
  S.subs = newSubs;
  S.isDemo = false;
  toast(`✅ 成功导入并应用 ${newSubs.length} 条新时间轴`,'ok');
  
  localStorage.setItem('pl_subs_' + S.videoId, JSON.stringify(S.subs));
  const sg=S.segs[S.segIdx];if(sg)renderSubsForSeg(sg);
});

async function translateSubs(){
  if(!S.apiKey){toast('请先填写 API Key','er');return;}
  const sg=S.segs[S.segIdx];if(!sg)return;
  const segSubs=S.subs.filter(s=>s.e>sg.s&&s.s<sg.e&&s.pt);
  if(!segSubs.length){toast('此段暂无字幕','er');return;}

  setAI(true,'🌐 AI 翻译字幕中...');
  const BATCH=20; 
  let totalCount=0;
  try{
    for(let i=0;i<segSubs.length;i+=BATCH){
      const batch=segSubs.slice(i,i+BATCH);
      const lines=batch.map((s,j)=>`${j+1}. ${s.pt}`).join('\n');
      const prompt=`你是葡萄牙语-中文翻译专家。请将以下巴西葡萄牙语字幕逐句翻译成简体中文。
翻译要求：口语自然、简洁准确、保留语气。

${lines}

仅返回JSON数组格式，与原文一一对应（共${batch.length}条）：
["译文1","译文2",...]`;

      setAI(true,`🌐 翻译中 ${i+1}–${Math.min(i+BATCH,segSubs.length)} / ${segSubs.length}...`);
      const res=await callAI(prompt);
      const clean=res.replace(/```json?\n?/g,'').replace(/```/g,'').trim();
      const translations=JSON.parse(clean);
      batch.forEach((sub,j)=>{
        if(translations[j]&&translations[j].trim()){sub.zh=translations[j].trim();totalCount++;}
      });
      if(i+BATCH<segSubs.length)await new Promise(res=>setTimeout(res,1500));
    }
    renderSubsForSeg(sg);
    toast(`✅ 已翻译 ${totalCount} 条字幕`,'ok');
    localStorage.setItem('pl_subs_' + S.videoId, JSON.stringify(S.subs));
  }catch(e){
    toast('翻译失败：'+e.message,'er');
    if(totalCount>0){renderSubsForSeg(sg);}
  }
  setAI(false);
}

function parseYT(d){
  if(!d||!d.events)return[];
  return d.events.filter(e=>e.segs).map(e=>{
    const t=e.tStartMs||0,dur=e.dDurationMs||3000;
    const txt=e.segs.map(s=>s.utf8||'').join('').trim();
    return{s:t/1000,e:(t+dur)/1000,pt:txt,zh:''};
  }).filter(s=>s.pt.length>0);
}

// ====================================================================
async function runAI(){
  if(!S.apiKey){toast('请先填写 API Key','er');return;}
  const sg=S.segs[S.segIdx];if(!sg)return;
  const subs=S.subs.filter(s=>s.e>sg.s&&s.s<sg.e);
  if(!subs.length){toast('此段无字幕','er');return;}

  setAI(true,'分析词汇和句型...');
  const txt=subs.map(s=>{
    if(s.pt!=='---'&&s.zh)return `[葡语] ${s.pt}\n[中文] ${s.zh}`;
    if(s.pt!=='---')return s.pt;
    return `[中文] ${s.zh}`;
  }).join('\n\n');
  const langNote=S.lang==='zh'?'用中文解释':'explain in English';

  const prompt=`以下是巴西葡萄牙语儿童视频字幕（${langNote}）：

---
${txt}
---

请完成：
1. 词汇分析(vocab)：8-12个重要词汇，每个提供：word(葡语词), type(词性), meaning(含义), example(原文例句), example_zh(例句中文翻译)
2. 双语对照(bilingual)：5-8个代表性句子，提供：pt(葡语), zh(中文翻译)

仅返回JSON格式，不要其他文字：
{"vocab":[...],"bilingual":[...]}`;

  try{
    setAI(true,'调用 AI API...');
    const res=await callAI(prompt);
    const clean=res.replace(/```json?\n?/g,'').replace(/```/g,'').trim();
    const data=JSON.parse(clean);
    const mat={label:sg.label,vid:S.videoId,ts:new Date().toISOString(),vocab:data.vocab||[],bilingual:data.bilingual||[]};
    S.materials.push(mat);
    save();
    renderVocab(data.vocab||[]);
    S.cards=data.vocab||[];S.cardIdx=0;renderCard();
    switchTab('vocab');
    toast('✨ AI 分析完成！','ok');
  }catch(e){
    toast('AI 分析失败：'+e.message,'er');
  }
  setAI(false);
}

async function callAI(prompt,retries=2){
  const model=S.geminiModel||'gemini-2.0-flash-lite';
  if(model.startsWith('deepseek')) return await callDeepSeekAPI(model,prompt,retries);

  const url=`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${S.apiKey}`;
  const r=await fetch(url,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.3,maxOutputTokens:2048}}),
  });
  if(!r.ok){
    const e=await r.json();
    const msg=e.error?.message||`HTTP ${r.status}`;
    if(retries>0&&(r.status===429||msg.includes('quota')||msg.includes('limit'))){
      await new Promise(res=>setTimeout(res,4000));
      return callAI(prompt,retries-1);
    }
    throw new Error(msg);
  }
  const d=await r.json();
  return d.candidates?.[0]?.content?.parts?.[0]?.text||'';
}

async function callDeepSeekAPI(model,prompt,retries=2){
  const url='https://api.deepseek.com/chat/completions';
  const r=await fetch(url,{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'Authorization':`Bearer ${S.apiKey}`
    },
    body:JSON.stringify({
      model:model,
      messages:[{role:'user',content:prompt}],
      temperature:0.3,
      response_format:{type:'json_object'}
    }),
  });
  if(!r.ok){
    const e=await r.json();
    const msg=e.error?.message||`HTTP ${r.status}`;
    if(retries>0&&(r.status===429||msg.includes('quota')||msg.includes('limit')||msg.includes('balance'))){
      await new Promise(res=>setTimeout(res,4000));
      return callDeepSeekAPI(model,prompt,retries-1);
    }
    throw new Error(msg);
  }
  const d=await r.json();
  let content=d.choices?.[0]?.message?.content||'';
  content=content.replace(/<think>[\s\S]*?<\/think>/g,'');
  return content;
}

  if(!S.materials.length){body.innerHTML='<p class="modal-empty">暂无材料，请先运行 AI 分析</p>';return;}
  body.innerHTML='';
  S.materials.forEach(mat=>{
    const el=document.createElement('div');el.className='mat-card';
    const date=new Date(mat.ts).toLocaleString('zh-CN');
    el.innerHTML=`
      <div class="mat-hdr"><span>📖 ${mat.label} — ${mat.vid}</span><span style="font-size:11px;color:var(--c-text3)">${date}</span></div>
      <div class="mat-body">
        <div>
          <div class="mat-sec-ttl">🗣 双语对照</div>
          ${mat.bilingual.map(b=>`<div class="bi-row"><div class="bi-pt">${b.pt}</div><div class="bi-zh">${b.zh}</div></div>`).join('')}
        </div>
        <div>
          <div class="mat-sec-ttl">📝 词汇</div>
          <div class="tag-cloud">
            ${mat.vocab.map(v=>`<div class="v-tag"><div class="v-tag-word">${v.word}</div><div class="v-tag-mean">${v.meaning}</div></div>`).join('')}
          </div>
        </div>
      </div>
    `;
    body.appendChild(el);
  });
}

function exportMats(){
  if(!S.materials.length){toast('没有材料','er');return;}
  let md='# PortuLearn 学习材料\n\n';
  S.materials.forEach(m=>{
    md+=`## ${m.label}\n\n### 双语对照\n\n`;
    md+='| 葡语 | 中文 |\n|------|------|\n';
    m.bilingual.forEach(b=>md+=`| ${b.pt} | ${b.zh} |\n`);
    md+='\n### 词汇\n\n| 单词 | 词性 | 含义 | 例句 |\n|------|------|------|------|\n';
    m.vocab.forEach(v=>md+=`| ${v.word} | ${v.type||''} | ${v.meaning} | ${v.example||''} |\n`);
    md+='\n---\n\n';
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([md],{type:'text/markdown;charset=utf-8'}));
  a.download='portulearn.md';a.click();
  toast('导出成功！','ok');
}

// ====================================================================
// PROGRESS BAR
// ====================================================================
function setupProg(){
  function seek(e){
    const r=$('prog-track').getBoundingClientRect();
    const pct=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));
    if(S.player)S.player.seekTo(pct*S.dur,true);
  }
  $('prog-track').addEventListener('mousedown',e=>{S.dragging=true;seek(e)});
  document.addEventListener('mousemove',e=>{if(S.dragging)seek(e)});
  document.addEventListener('mouseup',()=>S.dragging=false);
  $('prog-track').addEventListener('click',seek);
}

// ====================================================================
// SPEED
// ====================================================================
const SPEEDS=[0.5,0.75,1,1.25,1.5];let spdI=2;
function cycleSpd(){
  spdI=(spdI+1)%SPEEDS.length;S.rate=SPEEDS[spdI];
  $('btn-spd').textContent=S.rate+'×';
  if(S.player)S.player.setPlaybackRate(S.rate);
  toast(`速度 ${S.rate}×`,'in',1500);
}

// ====================================================================
// EVENTS
// ====================================================================
function setupEvents(){
  $('btn-go').addEventListener('click',()=>{
    const vid=extractId($('inp-url').value.trim());
    if(!vid){toast('请输入有效的 YouTube 链接','er');return;}
    loadVideo(vid);
  });
  $('inp-url').addEventListener('keydown',e=>{if(e.key==='Enter')$('btn-go').click();});
  
  // URL Persistence
  const lastVid = localStorage.getItem('pl_last_vid');
  if (lastVid) {
    $('inp-url').value = 'https://www.youtube.com/watch?v=' + lastVid;
  }
  
  document.querySelectorAll('.hint-chip').forEach(b=>{
    b.addEventListener('click',()=>{$('inp-url').value=b.dataset.url;$('btn-go').click();});
  });

  // API key
  $('btn-save-key').addEventListener('click',()=>{
    S.apiKey=$('inp-key').value.trim();save();toast('API Key 已保存','ok');
  });

  // Playback
  $('btn-pp').addEventListener('click',()=>{
    if(!S.player)return;
    S.playing?S.player.pauseVideo():S.player.playVideo();
  });
  $('btn-prev').addEventListener('click',()=>jumpTo(S.segIdx-1));
  $('btn-next').addEventListener('click',()=>jumpTo(S.segIdx+1));
  $('btn-rpl').addEventListener('click',()=>{
    const sg=S.segs[S.segIdx];if(sg)S.player.seekTo(sg.s,true);
    if(!S.playing)S.player.playVideo();
  });
  $('btn-spd').addEventListener('click',cycleSpd);
  $('btn-loop').addEventListener('click',()=>{
    S.looping=!S.looping;
    $('btn-loop').classList.toggle('on',S.looping);
    $('loop-chip').classList.toggle('on',S.looping);
    toast(S.looping?'循环开启':'循环关闭','in',1500);
  });
  $('btn-home').addEventListener('click',()=>{
    if(S.player)S.player.pauseVideo();
    if(S.raf)cancelAnimationFrame(S.raf);
    $('page-player').classList.add('hidden');
    $('page-home').classList.remove('hidden');
  });

  // Subtitle toggles
  $('ck-scroll').addEventListener('change',e=>S.autoScroll=e.target.checked);
  $('ck-pt').addEventListener('change',e=>{S.showPt=e.target.checked;const sg=S.segs[S.segIdx];if(sg)renderSubsForSeg(sg);});
  $('ck-zh').addEventListener('change',e=>{S.showZh=e.target.checked;const sg=S.segs[S.segIdx];if(sg)renderSubsForSeg(sg);});
  $('btn-ai').addEventListener('click',runAI);
  $('btn-trans').addEventListener('click',translateSubs);

  // Vocab export
  $('btn-exp').addEventListener('click',exportMats);

  // Tabs
  document.querySelectorAll('.tab-btn').forEach(b=>{
    b.addEventListener('click',()=>switchTab(b.dataset.tab));
  });

  // Cards
  $('btn-cprev').addEventListener('click',()=>{S.cardIdx=Math.max(0,S.cardIdx-1);renderCard();});
  $('btn-cnext').addEventListener('click',()=>{S.cardIdx=Math.min(S.cards.length-1,S.cardIdx+1);renderCard();});

  // Materials modal
  $('btn-mats').addEventListener('click',()=>{renderMats();$('mat-modal').classList.remove('hidden');});
  $('mat-close').addEventListener('click',()=>$('mat-modal').classList.add('hidden'));
  $('mat-modal').addEventListener('click',e=>{if(e.target===$('mat-modal'))$('mat-modal').classList.add('hidden');});
  $('btn-exp-all').addEventListener('click',exportMats);
  $('btn-clr').addEventListener('click',()=>{
    if(confirm('清空所有学习材料？')){S.materials=[];save();$('mat-modal').classList.add('hidden');toast('已清空','ok');}
  });

  // Settings modal
  $('btn-cfg').addEventListener('click',()=>$('cfg-modal').classList.remove('hidden'));
  $('cfg-close').addEventListener('click',()=>$('cfg-modal').classList.add('hidden'));
  $('cfg-modal').addEventListener('click',e=>{if(e.target===$('cfg-modal'))$('cfg-modal').classList.add('hidden');});
  $('btn-save-cfg').addEventListener('click',()=>{
    S.segMode=$('set-segmode').value;
    S.segLen=parseInt($('set-seglen').value)||270;
    S.customStart=(parseInt($('set-cs-m').value)||0)*60 + (parseInt($('set-cs-s').value)||0);
    S.customEnd=(parseInt($('set-ce-m').value)||0)*60 + (parseInt($('set-ce-s').value)||0);
    S.lang=$('set-lang').value;
    S.rate=parseFloat($('set-spd').value)||1;
    S.geminiModel=$('set-model').value;
    $('btn-spd').textContent=S.rate+'×';
    if(S.player)S.player.setPlaybackRate(S.rate);
    save();
    $('cfg-modal').classList.add('hidden');
    toast('设置已保存','ok');
    if(S.dur)buildSegs();
  });

  $('btn-clear-cache').addEventListener('click',()=>{
    if(!S.videoId){toast('请先加载一个视频','er');return;}
    if(confirm('确定要清除当前视频的字幕缓存吗？下次加载将重新从 YouTube 获取。')){
      localStorage.removeItem('pl_subs_' + S.videoId);
      toast('🗑️ 缓存已清除，刷新页面生效','ok');
    }
  });

  // Keyboard
  document.addEventListener('keydown',e=>{
    if(!S.player||e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
    if(e.key===' '){e.preventDefault();S.playing?S.player.pauseVideo():S.player.playVideo();}
    if(e.key==='ArrowLeft'){e.preventDefault();S.player.seekTo(Math.max(0,S.now-5),true);}
    if(e.key==='ArrowRight'){e.preventDefault();S.player.seekTo(Math.min(S.dur,S.now+5),true);}
    if(e.key==='ArrowUp'){e.preventDefault();jumpTo(S.segIdx-1);}
    if(e.key==='ArrowDown'){e.preventDefault();jumpTo(S.segIdx+1);}
    if(e.key==='r'||e.key==='R'){e.preventDefault();$('btn-rpl').click();}
    if(e.key==='l'||e.key==='L'){e.preventDefault();$('btn-loop').click();}
  });

  setupProg();
}

// ====================================================================
// INIT
// ====================================================================
document.addEventListener('DOMContentLoaded',()=>{
  load();
  setupEvents();
  $('loop-chip').classList.add('on');
  $('btn-loop').classList.add('on');
});
</script>
</body>
</html>
